<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración - ISAIR</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #0072ff;
      --red: #e62a22;
      --paper: #f4f6fa;
      --text: #1a1a2e;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--paper);
      color: var(--text);
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h1 {
      font-family: 'Sora', sans-serif;
      text-align: center;
      color: var(--blue);
      margin-top: 0;
    }
    .field {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }
    input[type="text"], input[type="number"], input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--red);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }
    .btn:hover {
      background: #c21a14;
    }
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
      font-weight: 600;
      text-align: center;
    }
    .msg.success { background: #d4edda; color: #155724; display: block; }
    .msg.error { background: #f8d7da; color: #721c24; display: block; }
    .auth-section { margin-bottom: 30px; padding-bottom: 30px; border-bottom: 1px solid #eee; }
    #priceForm { display: none; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Admin ISAIR</h1>
    
    <div class="auth-section" id="authSection">
      <div class="field">
        <label for="ghToken">Contraseña de Administrador (GitHub Token)</label>
        <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
        <small style="display:block; margin-top:8px; color:#666;">
          Para conseguir tu Token, andá a GitHub > Settings > Developer Settings > Personal Access Tokens > Fine-grained tokens. Dale permisos de lectura y escritura (Read & Write) a 'Contents'.
        </small>
      </div>
      <button class="btn" style="background:var(--blue);" onclick="loadPrices()" id="btnLoad">Entrar y cargar precios</button>
    </div>

    <form id="priceForm" onsubmit="savePrices(event)">
      <h3 style="margin-top:0;">Actualizar Precios ($)</h3>
      
      <div class="field">
        <label>Fibra Óptica 300MB</label>
        <input type="number" id="fibra_300" required>
      </div>
      <div class="field">
        <label>Internet + ISTV Move</label>
        <input type="number" id="fibra_istv_move" required>
      </div>
      <div class="field">
        <label>Internet + ISTV Full</label>
        <input type="number" id="fibra_istv_full" required>
      </div>
      <div class="field">
        <label>Internet + IS CAM</label>
        <input type="number" id="fibra_iscam" required>
      </div>
      <div class="field">
        <label>Internet Inalámbrica 15MB</label>
        <input type="number" id="inalambrica_15" required>
      </div>

      <button type="submit" class="btn" id="btnSave">Guardar Precios</button>
      <div id="statusMsg" class="msg"></div>
    </form>
  </div>

  <script>
    const REPO_OWNER = 'florcolazo';
    const REPO_NAME = 'isair-web';
    const FILE_PATH = 'precios.json';
    const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
    
    let currentSha = '';

    // Util: Decode Base64 safely (handles Unicode)
    function b64DecodeUnicode(str) {
      return decodeURIComponent(atob(str).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
    }

    // Util: Encode Base64 safely
    function b64EncodeUnicode(str) {
      return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
          function toSolidBytes(match, p1) {
              return String.fromCharCode('0x' + p1);
      }));
    }

    async function loadPrices() {
      const token = document.getElementById('ghToken').value;
      if (!token) return alert('Por favor, ingresá el Token.');
      
      const btn = document.getElementById('btnLoad');
      btn.textContent = 'Cargando...';
      btn.disabled = true;

      try {
        const response = await fetch(API_URL, {
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });

        if (!response.ok) throw new Error('Token inválido o no hay permisos.');

        const data = await response.json();
        currentSha = data.sha; // We need this to update the file later
        
        const content = JSON.parse(b64DecodeUnicode(data.content));
        
        document.getElementById('fibra_300').value = content.fibra_300 || '';
        document.getElementById('fibra_istv_move').value = content.fibra_istv_move || '';
        document.getElementById('fibra_istv_full').value = content.fibra_istv_full || '';
        document.getElementById('fibra_iscam').value = content.fibra_iscam || '';
        document.getElementById('inalambrica_15').value = content.inalambrica_15 || '';

        document.getElementById('authSection').style.display = 'none';
        document.getElementById('priceForm').style.display = 'block';

      } catch (err) {
        alert(err.message);
      } finally {
        btn.textContent = 'Entrar y cargar precios';
        btn.disabled = false;
      }
    }

    async function savePrices(e) {
      e.preventDefault();
      const token = document.getElementById('ghToken').value;
      const btn = document.getElementById('btnSave');
      const msg = document.getElementById('statusMsg');
      
      btn.textContent = 'Guardando...';
      btn.disabled = true;
      msg.className = 'msg';
      msg.textContent = '';

      const newPrices = {
        fibra_300: parseInt(document.getElementById('fibra_300').value, 10),
        fibra_istv_move: parseInt(document.getElementById('fibra_istv_move').value, 10),
        fibra_istv_full: parseInt(document.getElementById('fibra_istv_full').value, 10),
        fibra_iscam: parseInt(document.getElementById('fibra_iscam').value, 10),
        inalambrica_15: parseInt(document.getElementById('inalambrica_15').value, 10)
      };

      const jsonStr = JSON.stringify(newPrices, null, 2);
      const encodedContent = b64EncodeUnicode(jsonStr);

      try {
        const response = await fetch(API_URL, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: 'Actualizar precios desde Panel Admin',
            content: encodedContent,
            sha: currentSha
          })
        });

        if (!response.ok) throw new Error('Error al guardar. Revisá los permisos del Token.');
        
        const data = await response.json();
        currentSha = data.content.sha; // Update sha for next edit

        msg.textContent = '¡Precios guardados con éxito! Los cambios tardarán 2 minutos en reflejarse en la página principal.';
        msg.className = 'msg success';

      } catch (err) {
        msg.textContent = err.message;
        msg.className = 'msg error';
      } finally {
        btn.textContent = 'Guardar Precios';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
